# 📂 File: pubspec.yaml

name: spiritual_tracker_app
description: "A new Flutter project for spiritual tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Database
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Firebase & Authentication
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  google_sign_in: ^6.2.1

  # Date formatting & UI
  intl: ^0.20.2
  fl_chart: ^0.68.0

  # Files & Media (ഇവിടെയാണ് എറർ വന്നത്, വേർഷൻ ലേറ്റസ്റ്റ് ആക്കി)
  image_picker: ^1.1.2
  file_picker: ^8.0.3
  flutter_pdfview: ^1.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png