# 📂 File: pubspec.yaml
# നിലവിലുള്ള pubspec.yaml പൂർണ്ണമായും മാറ്റി ഇത് നൽകുക

name: spiritual_tracker_app
description: "A new Flutter project for spiritual tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Firebase Services
  firebase_core: ^2.24.2
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true