# 📂 File: pubspec.yaml

name: spiritual_tracker_app
description: "A new Flutter project for spiritual tracking."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  google_sign_in: ^6.2.1

  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.1.0
  path_provider: ^2.1.4
  path: ^1.9.0
  archive: ^3.6.1

  intl: ^0.20.2
  fl_chart: ^0.68.0

  image_picker: ^1.1.2
  file_picker: ^8.0.3
  flutter_pdfview: ^1.3.2
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  
  # ഡാറ്റാബേസിനുള്ള ഓട്ടോ-ജനറേറ്ററുകൾ (പുതിയതായി ആഡ് ചെയ്തു)
  build_runner: ^2.4.9
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png