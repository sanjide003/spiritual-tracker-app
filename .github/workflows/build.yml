# 📂 File: .github/workflows/build.yml

name: Build Flutter App
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Generate App Icons
        run: dart run flutter_launcher_icons

      - name: Build arm64 APK
        run: flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Rename APK for download
        run: mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk build/app/outputs/flutter-apk/spiritual-tracker-arm64-v8a-release.apk

      - name: Upload Single APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spiritual-tracker-arm64-v8a-release-apk
          path: build/app/outputs/flutter-apk/spiritual-tracker-arm64-v8a-release.apk
          if-no-files-found: error
